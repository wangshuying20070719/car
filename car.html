<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Moving Car</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .road {
            width: 100%;
            height: 120px;
            position: relative;
        }

        .car {
            width: 240px;
            height: 100px;
            position: absolute;
            left: -260px;
            animation: drive 8s linear infinite;
        }

        @keyframes drive {
            0% { left: -260px; }
            100% { left: 100%; }
        }

        .body {
            position: absolute;
            bottom: 20px;
            width: 240px;
            height: 60px;
            background: #5499F7;
            border-radius: 30px;
        }

        .top {
            position: absolute;
            bottom: 60px;
            left: 40px;
            width: 160px;
            height: 45px;
            background: #5499F7;
            border-radius: 22px 22px 0 0;
        }

        .window {
            position: absolute;
            top: 8px;
            left: 12px;
            width: 65px;
            height: 30px;
            background: #E3F2FD;
            border-radius: 12px;
        }

        .window.right {
            left: 83px;
        }

        .wheel {
            position: absolute;
            bottom: 0;
            width: 45px;
            height: 45px;
            background: #333;
            border-radius: 50%;
        }

        .wheel.left {
            left: 40px;
        }

        .wheel.right {
            right: 40px;
        }

        .light {
            position: absolute;
            right: 15px;
            top: 20px;
            width: 16px;
            height: 16px;
            background: #FFEA00;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="road">
        <div class="car">
            <div class="body">
                <div class="light"></div>
            </div>
            <div class="top">
                <div class="window"></div>
                <div class="window right"></div>
            </div>
            <div class="wheel left"></div>
            <div class="wheel right"></div>
        </div>
    </div>
</body>
</html>
